[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openperceptionlab"
version = "0.1.0"
description = "OpenPerceptionLab"
readme = "README.md"
requires-python = ">=3.10"

[project.scripts]
opl = "openperceptionlab.__main__:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
